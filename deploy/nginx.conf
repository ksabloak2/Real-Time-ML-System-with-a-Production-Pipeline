# Minimal nginx reverse proxy config for the FastAPI container.
# Place at /etc/nginx/conf.d/sentiment-api.conf on your EC2 instance.
#
# Assumes:
#   - nginx is installed (sudo apt install nginx / sudo yum install nginx)
#   - API runs on localhost:8000

server {
    listen 80;
    server_name _;   # replace with your domain or EC2 public DNS

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }
}
